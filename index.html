<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Pipeline</title>
<style>
  :root {
    --bg:#f9f9f8;--surface:#ffffff;--border:#e5e4e0;--border-light:#f0efeb;
    --text:#1a1a19;--muted:#6b6b68;--hint:#a0a09c;
    --pending-bg:#fef9ec;--pending-border:#f0c84a;--pending-text:#7a5c00;
    --processing-bg:#eef4ff;--processing-border:#5b96f7;--processing-text:#1a3f8f;
    --completed-bg:#edfaf3;--completed-border:#34c97a;--completed-text:#0d5c35;
    --refunded-bg:#fff4ec;--refunded-border:#f07a3a;--refunded-text:#7a3000;
    --cancelled-bg:#fef1f1;--cancelled-border:#f25555;--cancelled-text:#7a1515;
    --accent:#1a3f8f;--radius:10px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

  /* Topbar */
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .topbar-left{display:flex;align-items:center;gap:10px;}
  .logo{font-size:15px;font-weight:700;letter-spacing:-.3px;}
  .store-badge{font-size:11px;background:var(--processing-bg);color:var(--processing-text);padding:3px 8px;border-radius:20px;border:1px solid var(--processing-border);}
  .topbar-right{display:flex;align-items:center;gap:6px;}
  .btn-sm{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;background:var(--surface);color:var(--text);cursor:pointer;transition:background .12s;white-space:nowrap;}
  .btn-sm:hover{background:var(--bg);}
  .btn-sm.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  #sync-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--completed-border);animation:pulse 2s infinite;flex-shrink:0;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* Stats */
  .stats-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
  @media(max-width:700px){.stats-bar{grid-template-columns:repeat(3,1fr);}}
  .stat{background:var(--surface);padding:10px 14px;}
  .stat-label{font-size:10px;color:var(--muted);margin-bottom:3px;}
  .stat-value{font-size:17px;font-weight:600;letter-spacing:-.5px;}
  .stat-value.green{color:#0d5c35;}.stat-value.blue{color:var(--accent);}

  /* Pipeline */
  .pipeline-wrap{padding:16px 20px;overflow-x:auto;}
  .pipeline{display:grid;grid-template-columns:repeat(5,minmax(220px,1fr));gap:12px;align-items:start;min-width:1100px;}
  .col{border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);overflow:hidden;}
  .col.drag-over{border-style:dashed;border-color:var(--accent);background:var(--processing-bg);}
  .col-head{padding:10px 14px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;}
  .status-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid;}
  .pill-pending{background:var(--pending-bg);color:var(--pending-text);border-color:var(--pending-border);}
  .pill-processing{background:var(--processing-bg);color:var(--processing-text);border-color:var(--processing-border);}
  .pill-completed{background:var(--completed-bg);color:var(--completed-text);border-color:var(--completed-border);}
  .pill-refunded{background:var(--refunded-bg);color:var(--refunded-text);border-color:var(--refunded-border);}
  .pill-cancelled{background:var(--cancelled-bg);color:var(--cancelled-text);border-color:var(--cancelled-border);}
  .col-count{font-size:12px;color:var(--muted);font-weight:500;}
  .cards-area{padding:10px;min-height:150px;}

  /* Cards */
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px;cursor:grab;user-select:none;transition:border-color .12s,transform .15s;}
  .card:hover{border-color:#c0bfbb;transform:translateY(-1px);}
  .card:active{cursor:grabbing;opacity:.7;}
  .card.dragging{opacity:.35;}
  .card.auto-moved{animation:hl .8s ease;}
  @keyframes hl{0%{background:#fffbe6;border-color:#f0c84a;}100%{background:var(--bg);border-color:var(--border);}}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
  .card-id{font-size:11px;color:var(--hint);font-weight:500;}
  .card-source{font-size:10px;color:var(--hint);background:var(--border-light);padding:2px 6px;border-radius:4px;}
  .card-name{font-size:13px;font-weight:600;margin-bottom:2px;}
  .card-email{font-size:11px;color:var(--muted);margin-bottom:3px;word-break:break-all;}
  .card-product{font-size:11px;color:var(--muted);margin-bottom:3px;}
  .card-meta{display:flex;gap:6px;font-size:11px;color:var(--hint);margin-bottom:7px;flex-wrap:wrap;}
  .card-footer{display:flex;align-items:center;justify-content:space-between;}
  .card-amount{font-size:13px;font-weight:700;}
  .card-time{font-size:11px;color:var(--hint);}
  .card-actions{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
  .btn-action{font-size:12px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;touch-action:manipulation;}
  .btn-action:hover{background:var(--border-light);}
  .btn-action.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-action.danger{color:var(--cancelled-text);border-color:var(--cancelled-border);}
  .btn-action.danger:hover{background:var(--cancelled-bg);}
  .empty{text-align:center;padding:28px 0;color:var(--hint);font-size:12px;}

  /* Log */
  .log-panel{margin:0 20px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
  .log-head{padding:10px 14px;border-bottom:1px solid var(--border-light);font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:space-between;}
  .log-body{padding:8px 0;max-height:140px;overflow-y:auto;}
  .log-row{padding:5px 14px;font-size:11px;display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--border-light);}
  .log-row:last-child{border-bottom:none;}
  .log-time{color:var(--hint);min-width:64px;font-variant-numeric:tabular-nums;flex-shrink:0;}
  .log-msg{color:var(--text);flex:1;line-height:1.5;}
  .log-ok{color:var(--completed-text);font-size:11px;font-weight:500;}
  .log-err{color:var(--cancelled-text);font-size:11px;font-weight:500;}
  .log-pend{color:var(--pending-text);font-size:11px;font-weight:500;}

  /* Toast */
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a19;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;max-width:90vw;text-align:center;}
  #toast.show{opacity:1;}

  /* Modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end;justify-content:center;}
  @media(min-width:600px){.modal-bg{align-items:center;}}
  .modal-bg.open{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:24px;width:100%;max-height:90vh;overflow-y:auto;}
  @media(min-width:600px){.modal{border-radius:var(--radius);width:480px;max-height:none;}}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;display:block;}
  @media(min-width:600px){.modal-handle{display:none;}}
  .modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
  .field input,.field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface);color:var(--text);outline:none;}
  .field input:focus,.field select:focus{border-color:var(--accent);}
  .wh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:500px){.wh-grid{grid-template-columns:1fr;}}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
  .currency-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .currency-symbol{font-size:18px;font-weight:700;color:var(--accent);min-width:28px;}
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">Order Pipeline</div>
      <div class="store-badge">Google Sheets</div>
    </div>
    <div class="topbar-right">
      <span id="sync-status"><span class="sync-dot"></span><span id="sync-label">Live</span></span>
      <button class="btn-sm" onclick="fetchOrders()">&#8635; Sync</button>
      <button class="btn-sm" onclick="openSettings()">&#9965; Settings</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value blue" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Pending</div><div class="stat-value" id="s-pending">0</div></div>
    <div class="stat"><div class="stat-label">Processing</div><div class="stat-value" id="s-processing">0</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-value green" id="s-completed">0</div></div>
    <div class="stat"><div class="stat-label">Cancelled</div><div class="stat-value" id="s-cancelled">0</div></div>
    <div class="stat"><div class="stat-label">Revenue</div><div class="stat-value green" id="s-revenue">0</div></div>
  </div>

  <div class="pipeline-wrap">
    <div class="pipeline" id="pipeline"></div>
  </div>

  <div class="log-panel">
    <div class="log-head">
      <span>Automation log</span>
      <button class="btn-sm" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-body" id="log-body">
      <div class="log-row"><span class="log-time">--:--:--</span><span class="log-msg">Waiting for activity...</span></div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-bg" id="settings-modal" onclick="handleModalBg(event)">
  <div class="modal">
    <span class="modal-handle"></span>
    <div class="modal-title">Settings</div>

    <div class="field">
      <label>Google Sheet CSV URL</label>
      <input id="s-sheet-url" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv" style="font-size:12px;" />
    </div>

    <div class="field">
      <label>Currency Symbol</label>
      <div class="currency-row">
        <span class="currency-symbol" id="currency-preview">₦</span>
        <input id="s-currency" value="₦" maxlength="3" style="width:80px;" oninput="document.getElementById('currency-preview').textContent=this.value||'₦'" />
        <span style="font-size:12px;color:var(--muted);">e.g. ₦ $ £ € GH₵</span>
      </div>
    </div>

    <div class="field"><label>Poll interval (seconds)</label><input id="s-poll" type="number" min="10" value="60"></div>

    <div style="font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;margin-top:4px;">Webhook URLs</div>
    <div class="wh-grid">
      <div class="field"><label>On Pending</label><input id="s-wh-pending"></div>
      <div class="field"><label>On Processing</label><input id="s-wh-processing"></div>
      <div class="field"><label>On Completed</label><input id="s-wh-completed"></div>
      <div class="field"><label>On Refunded</label><input id="s-wh-refunded"></div>
      <div class="field"><label>On Cancelled</label><input id="s-wh-cancelled"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-sm" onclick="closeSettings()">Cancel</button>
      <button class="btn-sm active" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── DEFAULT CONFIG ──
const DEFAULT_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4tzGBi8pr1tW2ltpQdVYSBXSH2O2iWwoieXBOkGdrol8uFuBYJsFW6eSFb4Hiy58YUyrssiAiQMxz/pub?gid=0&single=true&output=csv';
const DEFAULT_N8N   = 'https://impurity-rejoice-gaffe.ngrok-free.dev';
const WEBHOOK_PATH  = '/webhook/orders';
let SHEET_URL = DEFAULT_SHEET;

const STAGES = ['pending','processing','completed','refunded','cancelled'];
const LABELS = {pending:'Pending',processing:'Processing',completed:'Completed',refunded:'Refunded',cancelled:'Cancelled'};
const NEXT   = {pending:'processing',processing:'completed'};

let ORDERS    = [];
let WEBHOOKS  = {};
let POLL_MS   = 60000;
let CURRENCY  = '₦';
let pollTimer = null;
let dragId    = null;

// ── Load settings from localStorage ──
function loadSettings(){
  try{
    const s = JSON.parse(localStorage.getItem('op_settings')||'{}');
    WEBHOOKS = s.webhooks || {
      pending:    DEFAULT_N8N + WEBHOOK_PATH,
      processing: DEFAULT_N8N + WEBHOOK_PATH,
      completed:  DEFAULT_N8N + WEBHOOK_PATH,
      refunded:   DEFAULT_N8N + WEBHOOK_PATH,
      cancelled:  DEFAULT_N8N + WEBHOOK_PATH,
    };
    POLL_MS   = s.poll     || 60000;
    CURRENCY  = s.currency  || '₦';
    SHEET_URL = s.sheetUrl  || DEFAULT_SHEET;
  }catch(_){
    WEBHOOKS = {
      pending:    DEFAULT_N8N + WEBHOOK_PATH,
      processing: DEFAULT_N8N + WEBHOOK_PATH,
      completed:  DEFAULT_N8N + WEBHOOK_PATH,
      refunded:   DEFAULT_N8N + WEBHOOK_PATH,
      cancelled:  DEFAULT_N8N + WEBHOOK_PATH,
    };
  }
}

function saveToStorage(){
  try{
    localStorage.setItem('op_settings', JSON.stringify({
      webhooks: WEBHOOKS, poll: POLL_MS, currency: CURRENCY, sheetUrl: SHEET_URL
    }));
  }catch(_){}
}

// ── Toast ──
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2600);
}

// ── Log ──
function logEntry(msg,status='ok'){
  const body=document.getElementById('log-body');
  const now=new Date();
  const time=[now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  if(body.children.length===1&&body.children[0].textContent.includes('Waiting'))body.innerHTML='';
  const cls={ok:'log-ok',err:'log-err',pending:'log-pend'}[status]||'log-ok';
  const label={ok:'OK',err:'Failed',pending:'Sent'}[status];
  const row=document.createElement('div'); row.className='log-row';
  row.innerHTML=`<span class="log-time">${time}</span><span class="log-msg">${msg}</span><span class="${cls}">${label}</span>`;
  body.prepend(row);
  if(body.children.length>60)body.lastChild.remove();
}
function clearLog(){
  document.getElementById('log-body').innerHTML='<div class="log-row"><span class="log-time">--:--:--</span><span class="log-msg">Log cleared</span></div>';
}

// ── Webhook ──
async function fireWebhook(order, newStatus){
  const url = WEBHOOKS[newStatus];
  const payload = {
    order_id:       order.id,
    order_number:   order.number,
    first_name:     order.firstName,
    last_name:      order.lastName,
    customer_email: order.email,
    product_id:     order.productId,
    product_name:   order.productName,
    category:       order.category,
    quantity:       order.quantity,
    unit_price:     order.unitPrice,
    total_price:    order.totalPrice,
    order_status:   newStatus,
    previous_status:order.status,
    order_date:     order.orderDate,
    next_stage:     NEXT[newStatus]||null,
    timestamp:      new Date().toISOString(),
    source:         'dashboard'
  };
  logEntry(`Webhook fired for ${order.number} to ${LABELS[newStatus]}`,'pending');
  if(!url){ logEntry(`No webhook URL for "${newStatus}" — skipped`,'err'); return false; }
  try{
    let advance=false;
    try{
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(res.ok){try{const j=await res.json();advance=j&&j.advance===true;}catch(_){}}
      logEntry(`Webhook delivered for ${order.number}`,'ok');
    }catch(_){
      await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'});
      logEntry(`Webhook delivered for ${order.number} (no-cors)`,'ok');
    }
    return advance;
  }catch(e){
    logEntry(`Webhook failed for ${order.number}: ${e.message}`,'err');
    return false;
  }
}

// ── Move order ──
async function moveOrder(id, newStatus){
  const order=ORDERS.find(o=>o.id===id);
  if(!order||order.status===newStatus)return;
  const prev=order.status;
  order.status=newStatus; order.updatedAt='just now';
  render(); toast(`${order.number} moved to ${LABELS[newStatus]}`);
  highlightCard(id);
  const shouldAdvance=await fireWebhook({...order,status:prev},newStatus);
  if(shouldAdvance&&NEXT[newStatus]){
    logEntry(`Auto advancing ${order.number} to ${LABELS[NEXT[newStatus]]}`,'pending');
    setTimeout(()=>moveOrder(id,NEXT[newStatus]),900);
  }
}
function highlightCard(id){
  const el=document.querySelector(`[data-id="${id}"]`);
  if(el){el.classList.add('auto-moved');setTimeout(()=>el.classList.remove('auto-moved'),900);}
}

// ── CSV Parser ──
function parseCSV(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim().toLowerCase().replace(/\s+/g,'_'));
  const col=k=>headers.indexOf(k);
  return lines.slice(1).map((line,i)=>{
    const cols=[];let cur='',inQ=false;
    for(const c of line){
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.replace(/^"|"$/g,'').trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.replace(/^"|"$/g,'').trim());
    const g=k=>cols[col(k)]||'';

    // Skip completely empty rows
    const orderId = g('order_id');
    if(!orderId) return null;

    const rawStatus=(g('order_status')||'pending').toLowerCase().trim();
    const totalRaw=g('total_price')||'0';
    const totalNum=parseFloat(String(totalRaw).replace(/[^\d.]/g,'')||'0');

    return{
      id:        orderId,
      number:    '#'+orderId,
      firstName: g('first_name'),
      lastName:  g('last_name'),
      name:      (g('first_name')+' '+g('last_name')).trim()||'Unknown',
      email:     g('customer_email'),
      productId: g('product_id'),
      productName: g('product_name'),
      category:  g('category'),
      quantity:  g('quantity'),
      unitPrice: g('unit_price'),
      totalPrice:totalRaw,
      totalNum:  totalNum,
      amount:    CURRENCY + totalNum.toLocaleString('en-NG'),
      status:    mapStatus(rawStatus),
      orderDate: g('order_date'),
      updatedAt: g('order_date')||'from sheet',
      source:    'Google Sheets'
    };
  }).filter(Boolean);
}

function mapStatus(s){
  const map={
    pending:'pending','on-hold':'pending',new:'pending',
    processing:'processing','in progress':'processing',active:'processing',
    completed:'completed',done:'completed',delivered:'completed',paid:'completed',
    refunded:'refunded',refund:'refunded',
    cancelled:'cancelled',canceled:'cancelled',rejected:'cancelled'
  };
  return map[s]||'pending';
}

// ── Fetch orders ──
async function fetchOrders(){
  setSyncStatus('syncing');
  try{
    const res=await fetch(SHEET_URL+'&cb='+Date.now());
    const text=await res.text();
    ORDERS=parseCSV(text);
    render();
    setSyncStatus('live');
    logEntry(`Synced ${ORDERS.length} orders from sheet`,'ok');
  }catch(e){
    setSyncStatus('error');
    logEntry('Sync failed: '+e.message,'err');
    toast('Sync failed: '+e.message);
  }
}

// ── Auto sync ──
async function syncAndAutoMove(){
  try{
    const res=await fetch(SHEET_URL+'&cb='+Date.now());
    const text=await res.text();
    const fresh=parseCSV(text);
    let moved=0;
    fresh.forEach(n=>{
      const ex=ORDERS.find(o=>o.id===n.id);
      if(ex&&ex.status!==n.status){
        logEntry(`Sheet update: ${n.number} ${LABELS[ex.status]} to ${LABELS[n.status]}`,'pending');
        moveOrder(n.id,n.status); moved++;
      } else if(!ex){ ORDERS.push(n); }
    });
    if(moved===0) render();
  }catch(e){ logEntry('Auto sync error: '+e.message,'err'); }
}

function setSyncStatus(state){
  const colors={live:'var(--completed-border)',syncing:'#f0c84a',error:'#f25555'};
  const labels={live:'Live',syncing:'Syncing',error:'Error'};
  document.querySelector('.sync-dot').style.background=colors[state]||colors.live;
  document.getElementById('sync-label').textContent=labels[state]||'Live';
}

// ── Render ──
function render(){
  const pipeline=document.getElementById('pipeline');
  pipeline.innerHTML=STAGES.map(s=>colHTML(s)).join('');

  STAGES.forEach(s=>{
    const col=document.getElementById('col-'+s);
    if(!col)return;
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drag-over');if(dragId)moveOrder(dragId,s);dragId=null;});
  });

  document.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragId=e.currentTarget.dataset.id;e.currentTarget.classList.add('dragging');});
    el.addEventListener('dragend',e=>e.currentTarget.classList.remove('dragging'));
  });

  const completed=ORDERS.filter(o=>o.status==='completed');
  const revenue=completed.reduce((a,o)=>a+(o.totalNum||0),0);
  document.getElementById('s-total').textContent=ORDERS.length;
  document.getElementById('s-pending').textContent=ORDERS.filter(o=>o.status==='pending').length;
  document.getElementById('s-processing').textContent=ORDERS.filter(o=>o.status==='processing').length;
  document.getElementById('s-completed').textContent=completed.length;
  document.getElementById('s-cancelled').textContent=ORDERS.filter(o=>o.status==='cancelled').length;
  document.getElementById('s-revenue').textContent=CURRENCY+revenue.toLocaleString('en-NG');
}

function colHTML(status){
  const orders=ORDERS.filter(o=>o.status===status);
  const next=NEXT[status];
  const cards=orders.length
    ?orders.map(o=>`
      <div class="card" draggable="true" data-id="${o.id}">
        <div class="card-header"><span class="card-id">${o.number}</span><span class="card-source">${o.source}</span></div>
        <div class="card-name">${o.name}</div>
        <div class="card-email">${o.email||''}</div>
        <div class="card-product">${o.productName||''}</div>
        <div class="card-meta">
          ${o.category?`<span>${o.category}</span>`:''}
          ${o.quantity?`<span>Qty: ${o.quantity}</span>`:''}
          ${o.orderDate?`<span>${o.orderDate}</span>`:''}
        </div>
        <div class="card-footer">
          <span class="card-amount">${CURRENCY}${parseFloat(String(o.totalPrice).replace(/[^\d.]/g,'')||0).toLocaleString('en-NG')}</span>
          <span class="card-time">${o.updatedAt}</span>
        </div>
        <div class="card-actions">
          ${next?`<button class="btn-action primary" onclick="moveOrder('${o.id}','${next}')">to ${LABELS[next]}</button>`:''}
          ${!['cancelled','completed','refunded'].includes(status)?`<button class="btn-action danger" onclick="moveOrder('${o.id}','cancelled')">Cancel</button>`:''}
          ${status==='completed'?`<button class="btn-action" onclick="moveOrder('${o.id}','refunded')">Refund</button>`:''}
        </div>
      </div>`).join('')
    :`<div class="empty">No ${LABELS[status].toLowerCase()} orders</div>`;
  return`<div class="col" id="col-${status}"><div class="col-head"><span class="status-pill pill-${status}">${LABELS[status]}</span><span class="col-count">${orders.length}</span></div><div class="cards-area">${cards}</div></div>`;
}

// ── Settings modal ──
function openSettings(){
  ['pending','processing','completed','refunded','cancelled'].forEach(k=>{
    document.getElementById('s-wh-'+k).value=WEBHOOKS[k]||'';
  });
  document.getElementById('s-poll').value=POLL_MS/1000;
  document.getElementById('s-currency').value=CURRENCY;
  document.getElementById('currency-preview').textContent=CURRENCY;
  document.getElementById('s-sheet-url').value=SHEET_URL;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings(){document.getElementById('settings-modal').classList.remove('open');}
function handleModalBg(e){if(e.target===document.getElementById('settings-modal'))closeSettings();}
function saveSettings(){
  ['pending','processing','completed','refunded','cancelled'].forEach(k=>{
    WEBHOOKS[k]=document.getElementById('s-wh-'+k).value||DEFAULT_N8N+WEBHOOK_PATH;
  });
  POLL_MS=(parseInt(document.getElementById('s-poll').value)||60)*1000;
  CURRENCY=document.getElementById('s-currency').value||'₦';
  SHEET_URL=document.getElementById('s-sheet-url').value||DEFAULT_SHEET;
  saveToStorage();
  clearInterval(pollTimer);
  pollTimer=setInterval(syncAndAutoMove, POLL_MS);
  closeSettings();
  toast('Settings saved');
  render();
}

// ── Init ──
window.addEventListener('DOMContentLoaded',()=>{
  loadSettings();
  fetchOrders();
  pollTimer=setInterval(syncAndAutoMove, POLL_MS);
});
</script>
